apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ai-bridge.frontend.fullname" . }}-nginx
  labels:
    {{- include "ai-bridge.frontend.labels" . | nindent 4 }}
data:
  # Override main nginx.conf so pid and worker_processes work without root
  nginx.conf: |
    worker_processes auto;
    pid /tmp/nginx.pid;
    error_log /var/log/nginx/error.log warn;

    events {
        worker_connections 1024;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        client_body_temp_path /tmp/client_body;
        proxy_temp_path       /tmp/proxy;
        fastcgi_temp_path     /tmp/fastcgi;
        uwsgi_temp_path       /tmp/uwsgi;
        scgi_temp_path        /tmp/scgi;
        sendfile on;
        keepalive_timeout 65;
        include /etc/nginx/conf.d/*.conf;
    }

  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        resolver {{ .Values.frontend.dnsResolver }} valid=30s;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /health {
            set $backend http://{{ include "ai-bridge.backend.fullname" . }}:{{ .Values.backend.service.port }};
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            set $backend http://{{ include "ai-bridge.backend.fullname" . }}:{{ .Values.backend.service.port }};
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    }
