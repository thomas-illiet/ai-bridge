apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-bridge.frontend.fullname" . }}
  labels:
    {{- include "ai-bridge.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "ai-bridge.frontend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
